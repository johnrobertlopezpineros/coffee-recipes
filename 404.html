<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diario de Café — K6</title>
<script>
  // GitHub Pages SPA fix: redirect cualquier ruta 404 de vuelta al index
  var seg = window.location.pathname.split('/').slice(1);
  var repo = seg[0]; // nombre del repositorio
  var redirect = window.location.protocol + '//' + window.location.hostname +
    (repo ? '/' + repo : '') + '/' +
    '?' + seg.slice(1).join('/').replace(/&/g, '~and~') +
    (window.location.search ? '&' + window.location.search.slice(1).replace(/&/g, '~and~') : '') +
    window.location.hash;
  window.location.replace(redirect);
</script>
</head>
<body>
  <p style="font-family:monospace;color:#5a4e46;text-align:center;margin-top:3rem">Redirigiendo…</p>
</body>
</html>
