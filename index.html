<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#faf7f4">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Café K6">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-180x180.png">
<link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152x152.png">
<link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180x180.png">
<title>Diario de Café -- K6</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#faf7f4;--bg2:#f2ede7;--bg3:#e8e0d8;
  --border:#d8cfc6;--border2:#c4b8ac;
  --text:#1c1714;--text2:#5a4e46;--text3:#96877c;
  --accent:#b8621a;--accent2:#d4813a;--gold:#b07d1a;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;font-size:17px;line-height:1.5;display:flex;flex-direction:column}

header{padding:calc(var(--safe-top) + 14px) 1.25rem 12px;border-bottom:0.5px solid var(--border);background:var(--bg);flex-shrink:0}
.header-inner{display:flex;align-items:baseline;justify-content:space-between;gap:1rem}
h1{font-family:'DM Serif Display',serif;font-size:2rem;font-weight:400;color:var(--text)}
h1 span{color:var(--accent);font-style:italic}
.header-meta{font-size:13px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase}

.tab-bar{display:flex;border-bottom:0.5px solid var(--border);background:var(--bg);flex-shrink:0}
.tab-btn{flex:1;padding:14px 0;font-size:15px;font-family:'DM Mono',monospace;font-weight:400;letter-spacing:.07em;text-transform:uppercase;background:transparent;border:none;border-bottom:1.5px solid transparent;color:var(--text3);cursor:pointer;transition:all .18s}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}

.tab-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.tab-pane{display:none;padding:1rem 1rem calc(var(--safe-bottom) + 1.5rem)}
.tab-pane.active{display:block}

/* Filters */
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.filter-label{font-size:13px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;width:100%;margin-bottom:3px}
.filter-btn{padding:7px 14px;font-size:13px;font-family:'DM Mono',monospace;letter-spacing:.04em;border-radius:3px;border:0.5px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer;transition:all .15s}
.filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* Grid */
.recipes-grid{display:grid;grid-template-columns:1fr;gap:10px}
@media(min-width:560px){.recipes-grid{grid-template-columns:repeat(2,1fr)}}
@media(min-width:860px){.recipes-grid{grid-template-columns:repeat(3,1fr)}}

/* Card */
.recipe-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:6px;padding:1rem 1.1rem;cursor:pointer;transition:border-color .15s}
.recipe-card.expanded{border-color:var(--accent2)}
.card-method{font-size:13px;font-weight:500;color:var(--accent);text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px}
.card-title{font-family:'DM Serif Display',serif;font-size:1.2rem;font-weight:400;color:var(--text);margin-bottom:3px;line-height:1.3}
.card-desc{font-size:14px;color:var(--text3);margin-top:1px}
.card-header-row{display:flex;justify-content:space-between;align-items:flex-start}
.expand-icon{font-size:14px;color:var(--text3);margin-left:6px;flex-shrink:0;transition:transform .2s;margin-top:3px}
.recipe-card.expanded .expand-icon{transform:rotate(180deg);color:var(--accent)}

/* Selectors */
.selectors-row{display:flex;gap:12px;margin-top:11px;flex-wrap:wrap;align-items:flex-end}
.selector-group{display:flex;flex-direction:column;gap:5px}
.selector-label{font-size:13px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase}

/* Dose input -- flexible number field */
.dose-input-wrap{display:flex;align-items:center;gap:5px}
.dose-input{width:62px;font-size:16px;font-family:'DM Mono',monospace;font-weight:500;padding:5px 7px;border:0.5px solid var(--border2);border-radius:3px;background:var(--bg);color:var(--text);text-align:center;-webkit-appearance:none;appearance:none}
.dose-input:focus{outline:none;border-color:var(--accent)}
.dose-unit{font-size:15px;color:var(--text3)}
/* Stepper buttons */
.dose-step{width:30px;height:30px;font-size:18px;line-height:1;display:flex;align-items:center;justify-content:center;border:0.5px solid var(--border2);border-radius:3px;background:var(--bg);color:var(--text2);cursor:pointer;user-select:none;flex-shrink:0}
.dose-step:active{background:var(--bg3)}

/* Ratio buttons */
.selector-btns{display:flex;gap:4px}
.sel-btn{padding:6px 12px;font-size:13px;font-family:'DM Mono',monospace;border-radius:3px;border:0.5px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer;transition:all .13s}
.sel-btn.active{background:var(--bg3);color:var(--text);border-color:var(--border2)}

/* Stats */
.stats-row{display:flex;gap:6px;margin-top:10px}
.stat-pill{display:flex;flex-direction:column;align-items:center;background:var(--bg);border:0.5px solid var(--border);border-radius:4px;padding:8px 6px;flex:1}
.stat-val{font-size:17px;font-weight:500;color:var(--text)}
.stat-key{font-size:12px;color:var(--text3);margin-top:2px;letter-spacing:.04em;text-align:center}

/* Detail */
.detail-section{margin-top:10px;padding-top:10px;border-top:0.5px solid var(--border);animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.steps-list{list-style:none}
.step-item{display:flex;gap:8px;align-items:flex-start;padding:8px 0;border-bottom:0.5px solid var(--border);font-size:14px;color:var(--text2)}
.step-item:last-child{border-bottom:none}
.step-num{font-size:11px;color:var(--accent);background:var(--bg2);border:0.5px solid var(--accent2);border-radius:3px;width:20px;height:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.step-time{font-size:13px;color:var(--text3);margin-left:auto;padding-left:8px;white-space:nowrap}
.time-total-row{display:flex;justify-content:space-between;margin-top:9px;margin-bottom:3px;font-size:14px}
.time-total-row span:first-child{color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
.time-total-row span:last-child{color:var(--text);font-weight:500}
.notes-box{font-size:13px;color:var(--text2);background:var(--bg);border-radius:3px;padding:8px 10px;margin-top:8px;border-left:1.5px solid var(--accent2)}

/* Log form */
.log-form{background:var(--bg2);border:0.5px solid var(--border);border-radius:6px;padding:1.2rem;margin-bottom:.9rem}
.form-title{font-family:'DM Serif Display',serif;font-size:1.1rem;font-weight:400;margin-bottom:1rem;color:var(--text)}
.form-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:9px}
.form-group{display:flex;flex-direction:column;gap:5px;flex:1;min-width:120px}
.form-group label{font-size:13px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em}
.form-group select,.form-group input,.form-group textarea{
  font-size:16px;font-family:'DM Mono',monospace;
  padding:8px 10px;border:0.5px solid var(--border2);border-radius:4px;
  background:var(--bg);color:var(--text);width:100%;
  -webkit-appearance:none;appearance:none;transition:border-color .15s;
}
.form-group select:focus,.form-group input:focus,.form-group textarea:focus{outline:none;border-color:var(--accent)}
.form-group textarea{resize:vertical;min-height:58px}
.full-row{flex-basis:100%;min-width:100%}

.form-section{font-size:13px;color:var(--text3);text-transform:uppercase;letter-spacing:.09em;margin:14px 0 9px;padding-top:11px;border-top:0.5px solid var(--border)}

/* Sliders */
.slider-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px 16px;margin-bottom:12px}
@media(min-width:480px){.slider-grid{grid-template-columns:repeat(3,1fr)}}
.slider-group{display:flex;flex-direction:column;gap:6px}
.slider-label-row{display:flex;justify-content:space-between;align-items:baseline}
.slider-label{font-size:13px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
.slider-val{font-size:15px;font-weight:500;color:var(--accent);font-family:'DM Mono',monospace}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:4px;border-radius:2px;background:var(--border2);outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:20px;height:20px;border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid var(--bg);box-shadow:0 1px 3px rgba(0,0,0,.12)}
input[type=range]::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid var(--bg)}

.score-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.score-row label{font-size:13px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;white-space:nowrap}
.score-row input[type=range]{flex:1}
.score-display{font-size:18px;font-weight:500;color:var(--accent);font-family:'DM Mono',monospace;min-width:38px;text-align:right}

.btn-row{display:flex;gap:8px;margin-top:9px}
.submit-btn{flex:1;padding:13px;font-size:15px;font-family:'DM Mono',monospace;letter-spacing:.07em;text-transform:uppercase;border:0.5px solid var(--accent);border-radius:4px;background:var(--accent);color:#fff;cursor:pointer;transition:opacity .15s}
.submit-btn:active{opacity:.75}
.export-btn{padding:13px 16px;font-size:15px;font-family:'DM Mono',monospace;letter-spacing:.06em;text-transform:uppercase;border:0.5px solid var(--border2);border-radius:4px;background:transparent;color:var(--text3);cursor:pointer;transition:all .15s;white-space:nowrap}
.export-btn:disabled{opacity:.3;cursor:not-allowed}
.status-msg{font-size:14px;color:var(--accent);margin-top:8px;min-height:16px;text-align:center;letter-spacing:.04em}

/* Log list */
.log-header-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:.8rem}
.log-header-bar h3{font-family:'DM Serif Display',serif;font-size:1.1rem;font-weight:400;color:var(--text)}
.log-list{display:flex;flex-direction:column;gap:8px}
.log-item{background:var(--bg2);border:0.5px solid var(--border);border-radius:6px;padding:.95rem 1.1rem}
.log-item-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.log-title{font-size:15px;font-weight:500;color:var(--text)}
.log-bean{font-size:14px;color:var(--accent);font-style:italic;margin-top:2px}
.log-meta{font-size:13px;color:var(--text3);margin-top:2px}
.log-score{font-size:17px;font-weight:500;color:var(--accent);font-family:'DM Mono',monospace;white-space:nowrap}
.log-descriptors{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.desc-pill{font-size:12px;background:var(--bg3);border:0.5px solid var(--border);border-radius:20px;padding:3px 9px;color:var(--text2)}
.log-notes{font-size:14px;color:var(--text2);margin-top:6px;line-height:1.5}
.delete-btn{background:none;border:none;cursor:pointer;font-size:15px;color:var(--text3);padding:3px 6px;border-radius:3px;flex-shrink:0;margin-left:8px}
.delete-btn:active{color:#c0392b}
.empty-state{text-align:center;padding:2.5rem 1rem;color:var(--text3);font-size:15px;line-height:1.9}
.empty-state em{font-family:'DM Serif Display',serif;font-style:italic;color:var(--text2);font-size:1.1rem}

#sync-indicator{transition:color .3s}
#sync-indicator.ok{color:#6a8f5a}
#sync-indicator.err{color:#b84040}

/* ── Login screen ── */
#login-screen{
  position:fixed;inset:0;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:1000;padding:2rem;
}
#login-screen h2{font-family:'DM Serif Display',serif;font-size:2rem;font-weight:400;margin-bottom:.4rem;text-align:center}
#login-screen h2 span{color:var(--accent);font-style:italic}
#login-screen p{font-size:14px;color:var(--text3);margin-bottom:2.5rem;text-align:center;line-height:1.6}
.login-btn{
  display:flex;align-items:center;gap:12px;
  padding:13px 24px;font-size:15px;font-family:'DM Mono',monospace;
  border:0.5px solid var(--border2);border-radius:4px;
  background:var(--bg2);color:var(--text);cursor:pointer;
  transition:border-color .15s;width:100%;max-width:280px;justify-content:center;
}
.login-btn:hover{border-color:var(--accent)}
.login-btn svg{flex-shrink:0}
.login-loading{font-size:13px;color:var(--text3);margin-top:1rem;min-height:20px;text-align:center}

/* ── User avatar in header ── */
.user-area{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0}
.user-avatar{width:30px;height:30px;border-radius:50%;object-fit:cover;border:1.5px solid var(--border2)}
.user-name{font-size:12px;color:var(--text3);max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.logout-btn{font-size:11px;color:var(--text3);background:none;border:0.5px solid var(--border2);border-radius:3px;padding:3px 8px;cursor:pointer;font-family:'DM Mono',monospace;letter-spacing:.04em}
.logout-btn:hover{border-color:var(--accent);color:var(--accent)}
</style>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, addDoc, deleteDoc, doc, query, orderBy, onSnapshot }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  import { getAuth, GoogleAuthProvider, signInWithRedirect,
    getRedirectResult, signOut, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA_pW_EABJE72jsumPxNvq550yjKn4zuG0",
    authDomain: "coffe-k6.firebaseapp.com",
    projectId: "coffe-k6",
    storageBucket: "coffe-k6.firebasestorage.app",
    messagingSenderId: "389009786415",
    appId: "1:389009786415:web:4442296d3bf608822568da"
  };

  const app      = initializeApp(firebaseConfig);
  const db       = getFirestore(app);
  const auth     = getAuth(app);
  const provider = new GoogleAuthProvider();

  let unsubscribe = null;

  // ── Handle redirect result first thing on load ────────────────────
  getRedirectResult(auth)
    .then(result => {
      if (result && result.user) {
        console.log('Redirect login OK:', result.user.email);
      }
      window.dispatchEvent(new Event('fb-ready'));
    })
    .catch(err => {
      console.error('Redirect error:', err);
      const el = document.getElementById('login-msg');
      if (el) el.textContent = 'Error: ' + (err.message || err.code);
      window.dispatchEvent(new Event('fb-ready'));
    });

  // ── Auth helpers ──────────────────────────────────────────────────
  window._auth = {
    loginGoogle: function() {
      const el = document.getElementById('login-msg');
      if (el) el.textContent = 'Redirigiendo a Google...';
      // Always use redirect — most reliable across all browsers/devices
      return signInWithRedirect(auth, provider);
    },
    logout: () => signOut(auth),
    onUserChange: function(cb) { onAuthStateChanged(auth, cb); }
  };

  // ── Firestore helpers (per-user) ──────────────────────────────────
  window._fb = {
    async save(uid, entry) {
      const { id, ...data } = entry;
      const col = collection(db, 'users', uid, 'sessions');
      const ref = await addDoc(col, data);
      return ref.id;
    },
    async remove(uid, firestoreId) {
      await deleteDoc(doc(db, 'users', uid, 'sessions', firestoreId));
    },
    listen(uid, callback) {
      if (unsubscribe) unsubscribe();
      const col = collection(db, 'users', uid, 'sessions');
      const q   = query(col, orderBy('timestamp', 'desc'));
      unsubscribe = onSnapshot(q, snap => {
        const docs = snap.docs.map(d => ({ firestoreId: d.id, ...d.data() }));
        callback(docs);
      });
      return unsubscribe;
    },
    stopListening() {
      if (unsubscribe) { unsubscribe(); unsubscribe = null; }
    }
  };
</script>
</head>
<body>

<header>
  <div class="header-inner">
    <h1>Diario de <span>Café</span></h1>
    <span class="header-meta" style="display:none" id="header-meta-text">K6 · V60 &amp; más</span>
    <div class="user-area" id="user-area" style="display:none">
      <img id="user-avatar" class="user-avatar" src="" alt="" style="display:none">
      <span id="user-name" class="user-name"></span>
      <button class="logout-btn" onclick="doLogout()">Salir</button>
    </div>
    <span id="sync-indicator" style="font-size:11px;color:var(--text3);letter-spacing:.04em;margin-left:auto;display:none">☁ sync</span>
  </div>
</header>

<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('recipes')">Recetas</button>
  <button class="tab-btn" onclick="switchTab('log')">Mi Registro</button>
</div>

<div class="tab-content">

  <!-- RECETAS -->
  <div id="pane-recipes" class="tab-pane active">
    <div class="filters">
      <span class="filter-label">Filtrar por método</span>
      <button class="filter-btn active" onclick="setFilter('all',this)">Todos</button>
      <button class="filter-btn" onclick="setFilter('V60 Switch',this)">Switch</button>
      <button class="filter-btn" onclick="setFilter('V60 Tradicional',this)">Trad.</button>
      <button class="filter-btn" onclick="setFilter('V60 Neo Tritan',this)">Neo Tritan</button>
      <button class="filter-btn" onclick="setFilter('Aeropress',this)">Aeropress</button>
      <button class="filter-btn" onclick="setFilter('Origami',this)">Origami</button>
      <button class="filter-btn" onclick="setFilter('Chemex',this)">Chemex</button>
      <button class="filter-btn" onclick="setFilter('Prensa Francesa',this)">Prensa</button>
      <button class="filter-btn" onclick="setFilter('Sifón Japonés',this)">Sifón</button>
    </div>
    <div class="recipes-grid" id="recipes-grid"></div>
  </div>

  <!-- REGISTRO -->
  <div id="pane-log" class="tab-pane">
    <div class="log-form">
      <div class="form-title">Nueva sesión</div>

      <div class="form-row">
        <div class="form-group">
          <label>Método</label>
          <select id="log-method">
            <option>V60 Switch</option><option>V60 Tradicional</option>
            <option>V60 Neo Tritan</option><option>Aeropress</option>
            <option>Origami</option><option>Chemex</option>
            <option>Prensa Francesa</option><option>Sifón Japonés</option>
          </select>
        </div>
        <div class="form-group">
          <label>Ratio</label>
          <select id="log-ratio">
            <option value="14">1:14</option>
            <option value="15">1:15</option>
            <option value="16" selected>1:16</option>
            <option value="17">1:17</option>
            <option value="18">1:18</option>
          </select>
        </div>
      </div>

      <!-- Dosis flexible -->
      <div class="form-row">
        <div class="form-group">
          <label>Dosis de café</label>
          <div class="dose-input-wrap">
            <button class="dose-step" onclick="stepDoseLog(-1)">−</button>
            <input type="number" id="log-dose-input" value="18" min="1" max="60" inputmode="numeric" class="dose-input">
            <button class="dose-step" onclick="stepDoseLog(1)">+</button>
            <span class="dose-unit">g</span>
          </div>
        </div>
        <div class="form-group">
          <label>Nombre del café</label>
          <input type="text" id="log-bean" placeholder="Ej: Papayo Honey…">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Clicks molino</label>
          <input type="number" id="log-clicks" placeholder="Ej: 105" inputmode="numeric">
        </div>
        <div class="form-group">
          <label>Temperatura</label>
          <input type="text" id="log-temp" placeholder="Ej: 91°C">
        </div>
        <div class="form-group">
          <label>Tiempo final</label>
          <input type="text" id="log-time" placeholder="Ej: 3:45">
        </div>
      </div>

      <div class="form-section">Descriptores de taza</div>
      <div class="slider-grid">
        <div class="slider-group">
          <div class="slider-label-row"><span class="slider-label">Acidez</span><span class="slider-val" id="val-acidez">5</span></div>
          <input type="range" min="1" max="10" value="5" id="sl-acidez" oninput="updateSlider('acidez')">
        </div>
        <div class="slider-group">
          <div class="slider-label-row"><span class="slider-label">Dulzor</span><span class="slider-val" id="val-dulzor">5</span></div>
          <input type="range" min="1" max="10" value="5" id="sl-dulzor" oninput="updateSlider('dulzor')">
        </div>
        <div class="slider-group">
          <div class="slider-label-row"><span class="slider-label">Cuerpo</span><span class="slider-val" id="val-cuerpo">5</span></div>

// ── State ─────────────────────────────────────────────────────────────
let currentFilter='all', expandedId=null;
let selectedDoses={}, selectedRatios={};
let logs=[];

// ── Auth + Storage ───────────────────────────────────────────────────
let currentUser = null;

function setSync(state, msg) {
  const el = document.getElementById('sync-indicator');
  if (!el) return;
  el.style.display = msg ? '' : 'none';
  el.textContent = msg;
  el.className = state;
}

function cacheLocal(uid, data){
  try{ localStorage.setItem('cafe_logs_'+uid, JSON.stringify(data)); }catch(e){}
}
function loadCache(uid){
  try{ const d=localStorage.getItem('cafe_logs_'+uid); return d?JSON.parse(d):[]; }catch(e){ return []; }
}

// ── Login / Logout ────────────────────────────────────────────────────
function loginGoogle(){
  document.getElementById('login-msg').textContent = 'Redirigiendo a Google…';
  setTimeout(function(){ window._auth.loginGoogle(); }, 200);
}
function doLogout(){
  if(!confirm('Cerrar sesion?')) return;
  window._fb.stopListening();
  window._auth.logout();
}

// ── Show / hide login screen ──────────────────────────────────────────
function showLoginScreen(){
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-msg').textContent = '';
  document.getElementById('user-area').style.display = 'none';
  document.getElementById('sync-indicator').style.display = 'none';
}
function hideLoginScreen(user){
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('user-area').style.display = 'flex';
  document.getElementById('header-meta-text').style.display = '';
  const avatar = document.getElementById('user-avatar');
  const nameEl = document.getElementById('user-name');
  if(user.photoURL){ avatar.src=user.photoURL; avatar.style.display=''; }
  nameEl.textContent = user.displayName ? user.displayName.split(' ')[0] : user.email;
  setSync('ok', '☁ sync');
}

// ── Start Firestore listener for this user ────────────────────────────
function startUserListener(uid){
  setSync('', '⏳ cargando…');
  window._fb.listen(uid, function(docs){
    logs = docs;
    cacheLocal(uid, logs);
    renderLogs();
    setSync('ok', '☁ sync');
  });
}

// ── Auth state observer — runs on every auth change ───────────────────
function initAuth(){
  // onAuthStateChanged fires immediately with current state,
  // including after a redirect login
  window._auth.onUserChange(function(user){
    if(user){
      currentUser = user;
      hideLoginScreen(user);
      // Load cached data instantly, then sync from Firestore
      logs = loadCache(user.uid);
      if(logs.length) renderLogs();
      startUserListener(user.uid);
    } else {
      currentUser = null;
      logs = [];
      window._fb.stopListening();
      showLoginScreen();
      renderLogs();
    }
  });
}

function loadLogs(){
  // Show login screen until auth resolves
  document.getElementById('login-screen').style.display = 'flex';
  // Always wait for fb-ready — getRedirectResult must resolve first
  window.addEventListener('fb-ready', function() {
    initAuth();
  });
}

function saveLogs(){ /* no-op */ }

// ── Helpers ───────────────────────────────────────────────────────────
function updateSlider(n){document.getElementById('val-'+n).textContent=document.getElementById('sl-'+n).value;}
function updateScore(){document.getElementById('val-score').textContent=parseFloat(document.getElementById('sl-score').value).toFixed(1);}
function getDescriptors(){const o={};DESCRIPTORS.forEach(d=>o[d]=parseInt(document.getElementById('sl-'+d).value));return o;}

function stepDoseLog(delta){
  const el=document.getElementById('log-dose-input');
  const val=Math.min(60,Math.max(1,(parseInt(el.value)||18)+delta));
  el.value=val;
}
function stepDoseCard(id, delta){
  const el=document.getElementById('dose-input-'+id);
  const val=Math.min(60,Math.max(1,(parseInt(el.value)||18)+delta));
  el.value=val;
  selectedDoses[id]=val;
  renderRecipes();
}
function onDoseCardChange(id){
  const el=document.getElementById('dose-input-'+id);
  const val=Math.min(60,Math.max(1,parseInt(el.value)||18));
  el.value=val;
  selectedDoses[id]=val;
  renderRecipes();
}

function resetForm(){
  ['log-bean','log-clicks','log-temp','log-time','log-notes'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('log-dose-input').value=18;
  DESCRIPTORS.forEach(d=>{document.getElementById('sl-'+d).value=5;updateSlider(d);});
  document.getElementById('sl-score').value=7;updateScore();
}

// ── Recipes ───────────────────────────────────────────────────────────
function renderRecipes(){
  const grid=document.getElementById('recipes-grid');
  const filtered=currentFilter==='all'?RECIPES:RECIPES.filter(r=>r.method===currentFilter);
  grid.innerHTML=filtered.map(recipe=>{
    const dose = selectedDoses[recipe.id] || 18;
    const ratio = selectedRatios[recipe.id] || 16;
    const w = calcWater(dose, ratio);
    const isExp = expandedId===recipe.id;

    return `<div class="recipe-card${isExp?' expanded':''}" id="card-${recipe.id}">
      <div onclick="toggleExpand(${recipe.id})">
        <div class="card-header-row">
          <div>
            <div class="card-method">${recipe.method}</div>
            <div class="card-title">${recipe.name}</div>
            <div class="card-desc">${recipe.desc}</div>
          </div>
          <span class="expand-icon">${isExp?'▲':'▼'}</span>
        </div>
      </div>

      <div class="selectors-row" onclick="event.stopPropagation()">
        <div class="selector-group">
          <div class="selector-label">Dosis</div>
          <div class="dose-input-wrap">
            <button class="dose-step" onclick="stepDoseCard(${recipe.id},-1)">−</button>
            <input class="dose-input" id="dose-input-${recipe.id}" type="number" value="${dose}" min="1" max="60" inputmode="numeric"
              onchange="onDoseCardChange(${recipe.id})" oninput="onDoseCardChange(${recipe.id})">
            <button class="dose-step" onclick="stepDoseCard(${recipe.id},1)">+</button>
            <span class="dose-unit">g</span>
          </div>
        </div>
        <div class="selector-group">
          <div class="selector-label">Ratio</div>
          <div class="selector-btns">${RATIOS_OPT.map(r=>`<button class="sel-btn${ratio===r?' active':''}" onclick="setRatio(${recipe.id},${r})">1:${r}</button>`).join('')}</div>
        </div>
      </div>

      <div class="stats-row">
        <div class="stat-pill"><span class="stat-val">${recipe.baseClicks}</span><span class="stat-key">Clicks K6</span></div>
        <div class="stat-pill"><span class="stat-val">${w}ml</span><span class="stat-key">Agua</span></div>
        <div class="stat-pill"><span class="stat-val">${recipe.temp}</span><span class="stat-key">Temp.</span></div>
        <div class="stat-pill"><span class="stat-val">1:${ratio}</span><span class="stat-key">Ratio</span></div>
      </div>

      ${isExp?`<div class="detail-section">
        <ul class="steps-list">${recipe.steps(dose,ratio).map((s,i)=>`<li class="step-item"><span class="step-num">${i+1}</span><span>${s.s}</span><span class="step-time">${s.t}</span></li>`).join('')}</ul>

      </div>`:''}

}

function toggleExpand(id){expandedId=expandedId===id?null:id;renderRecipes();}
function setRatio(id,r){selectedRatios[id]=r;renderRecipes();}
function setFilter(val,btn){
  currentFilter=val;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');renderRecipes();
}
function switchTab(tab){
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  document.getElementById('pane-'+tab).classList.add('active');
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',
    (i===0&&tab==='recipes')||(i===1&&tab==='log')));
  if(tab==='log')renderLogs();
}

// ── Log ───────────────────────────────────────────────────────────────
async function submitLog(){
  const dose=parseInt(document.getElementById('log-dose-input').value)||18;
  const ratio=parseInt(document.getElementById('log-ratio').value)||16;
  const entry={
    id: Date.now(),
    timestamp: Date.now(),
    method:document.getElementById('log-method').value,
    dose, ratio,
    water: calcWater(dose,ratio),
    bean:document.getElementById('log-bean').value.trim(),
    clicks:document.getElementById('log-clicks').value,
    temp:document.getElementById('log-temp').value,
    brewTime:document.getElementById('log-time').value.trim(),
    descriptors:getDescriptors(),
    score:parseFloat(document.getElementById('sl-score').value),
    notes:document.getElementById('log-notes').value.trim(),
    date:new Date().toLocaleString('es-CO',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})
  };
  resetForm();
  setStatus('Guardando…');
  try {
    if (window._fb && currentUser) {
      await window._fb.save(currentUser.uid, entry);
      setStatus('Sesión guardada ✓');
    } else {
      // Offline fallback: save only to localStorage
      logs.unshift(entry);
      cacheLocal(logs);
      renderLogs();
      setStatus('Guardado localmente (sin conexión)');
    }
  } catch(e) {
    setStatus('Error al guardar. Intenta de nuevo.');
    console.error(e);
  }
}
async function deleteLog(firestoreId, localId) {
  if (!confirm('¿Eliminar esta sesión?')) return;
  try {
    if (window._fb && currentUser && firestoreId) {
      await window._fb.remove(currentUser.uid, firestoreId);
      // onSnapshot refreshes the list
    } else {
      logs = logs.filter(l => l.id !== localId);
      cacheLocal(logs);
      renderLogs();
    }
  } catch(e) {
    setStatus('Error al eliminar.');
    console.error(e);
  }
}
function setStatus(msg){const el=document.getElementById('status-msg');el.textContent=msg;setTimeout(()=>el.textContent='',3000);}

function renderLogs(){
  const list=document.getElementById('log-list');
  if(!logs.length){list.innerHTML='<div class="empty-state"><em>Sin sesiones aún</em><br><br>Registra tu próxima taza arriba.</div>';return;}
  list.innerHTML=logs.map(l=>{
    const desc=l.descriptors||{};
    const pills=Object.entries(desc).map(([k,v])=>`<span class="desc-pill">${k} ${v}/10</span>`).join('');
    const meta=[l.date, l.clicks?l.clicks+' clicks':null, l.temp||null, l.brewTime?'⏱ '+l.brewTime:null].filter(Boolean).join(' · ');
    return `<div class="log-item">
      <div class="log-item-header">
        <div style="flex:1;min-width:0">
          <div class="log-title">${l.method} · ${l.dose}g · 1:${l.ratio||16} · ${l.water||'--'}ml</div>
          ${l.bean?`<div class="log-bean">${l.bean}</div>`:''}
          <div class="log-meta">${meta}</div>
        </div>
        <div style="display:flex;align-items:center;flex-shrink:0">
          <span class="log-score">${(l.score||0).toFixed(1)}/10</span>
          <button class="delete-btn" onclick="deleteLog('${l.firestoreId||''}',${l.id})">✕</button>
        </div>
      </div>
      ${pills?`<div class="log-descriptors">${pills}</div>`:''}
      ${l.notes?`<div class="log-notes">${l.notes}</div>`:''}
    </div>`;
  }).join('');
}
